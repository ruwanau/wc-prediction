<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 World Cup Prediction Game</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top, rgba(34,197,94,0.15), transparent 30%),
        linear-gradient(to bottom, #08111f, #0f172a);
    }

    .glass {
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tab-active {
      background: linear-gradient(to right, #facc15, #f59e0b);
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/30 backdrop-blur border-b border-white/10">
  <div class="max-w-7xl mx-auto px-4 py-5 flex flex-wrap justify-between items-center gap-3">

    <h1 class="text-2xl font-bold text-yellow-400">
      ⚽ World Cup Prediction Game
    </h1>

    <div class="flex gap-2 flex-wrap">

      <button class="tab-btn tab-active px-4 py-2 rounded-xl bg-slate-800" data-tab="predictTab">
        Predict
      </button>

      <button class="tab-btn px-4 py-2 rounded-xl bg-slate-800" data-tab="leaderboardTab">
        Leaderboard
      </button>

      <!-- NEW TAB -->
      <button class="tab-btn px-4 py-2 rounded-xl bg-slate-800" data-tab="resultsTab">
        Results
      </button>

      <button class="tab-btn px-4 py-2 rounded-xl bg-slate-800" data-tab="rulesTab">
        Rules
      </button>

    </div>

  </div>
</header>

<main class="max-w-7xl mx-auto p-4">

<!-- PREDICT TAB -->
<section id="predictTab" class="tab-content">
  <div id="matchesContainer" class="grid md:grid-cols-2 gap-4"></div>
</section>

<!-- LEADERBOARD -->
<section id="leaderboardTab" class="tab-content hidden">
  <div class="glass p-6 rounded-xl">
    <h2 class="text-xl text-yellow-400 mb-4">Leaderboard</h2>
    <table class="w-full">
      <thead>
        <tr class="text-left border-b border-slate-700">
          <th>Rank</th><th>User</th><th>Scores</th><th>Outcomes</th><th>Points</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>
</section>

<!-- 🔥 NEW RESULTS TAB -->
<section id="resultsTab" class="tab-content hidden">

  <div class="glass p-6 rounded-xl">

    <h2 class="text-xl text-yellow-400 mb-5">
      🏁 Completed Match Results
    </h2>

    <div id="resultsContainer" class="grid md:grid-cols-2 gap-4"></div>

  </div>

</section>

<!-- RULES -->
<section id="rulesTab" class="tab-content hidden">
  <div class="glass p-6 rounded-xl">
    <h2 class="text-xl text-yellow-400 mb-3">Rules</h2>
    <p>Exact = 3 points | Correct outcome = 1 point | Knockout = x1.5</p>
  </div>
</section>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  onSnapshot,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfrWznaOhZzgkeYfnve7kCQIP1q5qcj7s",
  authDomain: "wc-prediction-nk.firebaseapp.com",
  projectId: "wc-prediction-nk",
  storageBucket: "wc-prediction-nk.firebasestorage.app",
  messagingSenderId: "791400320278",
  appId: "1:791400320278:web:7faed774a893dc7c399437"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function getMatches() {
  const snap = await getDocs(collection(db,"matches"));
  const data = [];
  snap.forEach(d => data.push({id:d.id,...d.data()}));
  return data;
}

async function getResults() {
  const snap = await getDocs(collection(db,"results"));
  const data = {};
  snap.forEach(d => data[d.id] = d.data());
  return data;
}

/* ---------------------------
   🔥 RESULTS TAB RENDER
----------------------------*/

async function renderResults() {

  const matches = await getMatches();
  const results = await getResults();

  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";

  const completed = matches.filter(m => results[m.id]);

  if (completed.length === 0) {
    container.innerHTML = `
      <div class="text-slate-400 col-span-full text-center p-6">
        No completed matches yet.
      </div>
    `;
    return;
  }

  completed.forEach(match => {

    const r = results[match.id];

    const card = document.createElement("div");
    card.className = "glass p-5 rounded-xl";

    card.innerHTML = `
      <div class="flex justify-between text-sm text-slate-300 mb-2">
        <span>${match.stage}</span>
        <span>${match.kickoff}</span>
      </div>

      <div class="text-lg font-bold mb-3">
        ${match.home} vs ${match.away}
      </div>

      <div class="text-2xl font-bold text-yellow-400">
        ${r.home} - ${r.away}
      </div>
    `;

    container.appendChild(card);

  });
}

/* ---------------------------
   TAB SWITCHING
----------------------------*/

document.querySelectorAll(".tab-btn").forEach(btn => {

  btn.addEventListener("click", () => {

    document.querySelectorAll(".tab-btn")
      .forEach(b => b.classList.remove("tab-active"));

    btn.classList.add("tab-active");

    document.querySelectorAll(".tab-content")
      .forEach(t => t.classList.add("hidden"));

    document.getElementById(btn.dataset.tab)
      .classList.remove("hidden");

    if (btn.dataset.tab === "resultsTab") {
      renderResults();
    }

  });

});

/* ---------------------------
   REALTIME UPDATE
----------------------------*/

onSnapshot(collection(db,"results"), () => {
  renderResults();
});

onSnapshot(collection(db,"matches"), () => {
  renderResults();
});

renderResults();

</script>

</body>
</html>
