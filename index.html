<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup Prediction Game</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, rgba(34,197,94,0.15), transparent 30%),
  linear-gradient(to bottom, #08111f, #0f172a);
}

.glass {
  background: rgba(15, 23, 42, 0.78);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

.tab-active {
  background: linear-gradient(to right, #facc15, #f59e0b);
  color: black;
  font-weight: bold;
}
</style>
</head>

<body class="text-white min-h-screen">

<header class="p-5 flex gap-2 flex-wrap">
  <button class="tab-btn tab-active px-4 py-2 bg-slate-800 rounded" data-tab="predict">Predict</button>
  <button class="tab-btn px-4 py-2 bg-slate-800 rounded" data-tab="leaderboard">Leaderboard</button>
  <button class="tab-btn px-4 py-2 bg-slate-800 rounded" data-tab="rules">Rules</button>
  <button class="tab-btn px-4 py-2 bg-slate-800 rounded" data-tab="results">Results</button>
</header>

<main class="p-5">

<!-- PREDICT -->
<section id="predict" class="tab">

<div id="lockBanner" class="hidden bg-red-600 p-3 rounded mb-4">
🔒 Predictions locked (match starting soon or admin locked)
</div>

<input id="user" placeholder="Your Name" class="p-2 text-black rounded mb-4"/>

<div id="matches"></div>

<button id="save" class="bg-yellow-400 text-black px-4 py-2 mt-4 rounded">
Save Predictions
</button>

</section>

<!-- RESULTS TAB -->
<section id="results" class="tab hidden">
<h2 class="text-xl mb-4 text-yellow-400">Completed Matches</h2>
<div id="resultsContainer"></div>
</section>

<!-- LEADERBOARD -->
<section id="leaderboard" class="tab hidden">
<h2 class="text-xl mb-4 text-yellow-400">Leaderboard</h2>
<div id="board"></div>
</section>

<!-- RULES -->
<section id="rules" class="tab hidden">
<p>3 pts exact, 1 pt outcome, 1.5x knockout multiplier.</p>
</section>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBfrWznaOhZzgkeYfnve7kCQIP1q5qcj7s",
  authDomain: "wc-prediction-nk.firebaseapp.com",
  projectId: "wc-prediction-nk",
  storageBucket: "wc-prediction-nk.firebasestorage.app",
  messagingSenderId: "791400320278",
  appId: "1:791400320278:web:7faed774a893dc7c399437"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ================= TIME HELPERS ================= */

// Convert AEST/AEDT stored time → user local time
function toLocalTime(ausTimeString) {
  const ausTime = new Date(ausTimeString); // stored ISO (Sydney time)
  return new Date(ausTime.getTime());
}

// Convert kickoff string (Sydney time input) to ISO
function toSydneyISO(localInput) {
  // interpret input as Sydney time
  const now = new Date();
  const offset = now.getTimezoneOffset() * 60000;
  return new Date(new Date(localInput).getTime() - offset).toISOString();
}

// lock rule: 30 min before kickoff
function isLocked(kickoffISO) {
  const now = new Date();
  const kickoff = new Date(kickoffISO);
  return now > new Date(kickoff.getTime() - 30 * 60000);
}

/* ================= LOAD MATCHES ================= */

async function loadMatches() {
const snap = await getDocs(collection(db,"matches"));
const matches = [];

snap.forEach(d => matches.push({id:d.id,...d.data()}));

render(matches);
renderResults(matches);
calculateBoard(matches);
}

/* ================= RENDER MATCHES ================= */

function render(matches) {

const container = document.getElementById("matches");
container.innerHTML = "";

matches.forEach(m => {

const locked = isLocked(m.kickoff);

const localKickoff = new Date(m.kickoff).toLocaleString();

container.innerHTML += `
<div class="glass p-4 mb-3 rounded">

<div class="flex justify-between">
<span>${m.home} vs ${m.away}</span>
<span>${m.stage}</span>
</div>

<div class="text-sm text-gray-300 mt-2">
Kickoff (your time): ${localKickoff}
</div>

<div class="mt-3 flex gap-2">
<input id="h-${m.id}" type="number" ${locked?'disabled':''} class="text-black p-1 rounded w-16"/>
<span>:</span>
<input id="a-${m.id}" type="number" ${locked?'disabled':''} class="text-black p-1 rounded w-16"/>
</div>

</div>
`;

});

}

/* ================= RESULTS TAB ================= */

function renderResults(matches){

const box = document.getElementById("resultsContainer");
box.innerHTML = "";

matches.forEach(m => {

if(!m.result) return;

box.innerHTML += `
<div class="glass p-3 mb-2 rounded">
${m.home} ${m.result.home} - ${m.result.away} ${m.away}
</div>
`;

});

}

/* ================= SAVE ================= */

document.getElementById("save").onclick = async () => {

const user = document.getElementById("user").value;

const matchesSnap = await getDocs(collection(db,"matches"));

const data = {};

matchesSnap.forEach(m => {

data[m.id] = {
home: Number(document.getElementById("h-"+m.id)?.value),
away: Number(document.getElementById("a-"+m.id)?.value)
};

});

await setDoc(doc(db,"predictions",user), {
user,
data
});

alert("Saved");

};

/* ================= LEADERBOARD ================= */

async function calculateBoard(matches){

const snap = await getDocs(collection(db,"predictions"));

let board = [];

snap.forEach(s => {

const d = s.data();

let score = 0;

matches.forEach(m => {

if(!m.result || !d.data[m.id]) return;

const p = d.data[m.id];
const r = m.result;

if(p.home==r.home && p.away==r.away) score += 3;
else if((p.home>p.away)==(r.home>r.away)) score += 1;

});

board.push({user:d.user,score});

});

board.sort((a,b)=>b.score-a.score);

document.getElementById("board").innerHTML =
board.map((b,i)=>`<div>${i+1}. ${b.user} - ${b.score}</div>`).join("");

}

/* ================= TABS ================= */

document.querySelectorAll(".tab-btn").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
document.getElementById(b.dataset.tab).classList.remove("hidden");
};
});

/* ================= AUTO REFRESH ================= */

onSnapshot(collection(db,"matches"), loadMatches);
onSnapshot(collection(db,"predictions"), loadMatches);
onSnapshot(collection(db,"results"), loadMatches);

loadMatches();

</script>

</body>
</html>
