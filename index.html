<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup Prediction Game</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(to bottom, #07111f, #0f172a);
}
.glass {
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}
.tab-active {
  background: #facc15;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body class="text-white">

<header class="p-4 border-b border-white/10 flex justify-between">
  <h1 class="text-xl font-bold text-yellow-400">⚽ World Cup Predictor</h1>

  <div class="flex gap-2">
    <button class="tab-btn tab-active px-3 py-2" data-tab="predict">Predict</button>
    <button class="tab-btn px-3 py-2" data-tab="leaderboard">Leaderboard</button>
    <button class="tab-btn px-3 py-2" data-tab="results">Results</button>
    <button class="tab-btn px-3 py-2" data-tab="admin">Admin</button>
  </div>
</header>

<main class="p-4">

<!-- PREDICT -->
<section id="predict" class="tab">

<div id="lockBanner" class="hidden bg-red-600 p-3 rounded mb-3">
🔒 Predictions locked (closes 30 min before kickoff)
</div>

<div id="matches"></div>

<button id="saveBtn" class="mt-4 bg-yellow-400 text-black px-4 py-2 rounded">
Save Predictions
</button>

</section>

<!-- RESULTS TAB -->
<section id="results" class="tab hidden">
  <h2 class="text-xl mb-3 text-yellow-400">Completed Matches</h2>
  <div id="resultsList"></div>
</section>

<!-- LEADERBOARD -->
<section id="leaderboard" class="tab hidden">
  <h2 class="text-xl text-yellow-400 mb-3">Leaderboard</h2>
  <div id="board"></div>
</section>

<!-- ADMIN -->
<section id="admin" class="tab hidden">

<div class="glass p-4 mb-4">
  <input id="home" placeholder="Home" class="p-2 text-black"/>
  <input id="away" placeholder="Away" class="p-2 text-black"/>
  <input id="kickoff" placeholder="Kickoff (AEST YYYY-MM-DD HH:MM)" class="p-2 text-black"/>
  <button id="addMatch" class="bg-green-500 px-3 py-2 mt-2">Add Match</button>
</div>

<div id="adminList"></div>

</section>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
doc, setDoc, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyBfrWznaOhZzgkeYfnve7kCQIP1q5qcj7s",
  authDomain: "wc-prediction-nk.firebaseapp.com",
  projectId: "wc-prediction-nk",
  storageBucket: "wc-prediction-nk.firebasestorage.app",
  messagingSenderId: "791400320278",
  appId: "1:791400320278:web:7faed774a893dc7c399437"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ---------------- TIME HELPERS ---------------- */

// Convert AEST input → UTC ISO
function parseAESTtoUTC(str) {
  // input: "2026-06-10 18:00" (AEST = UTC+10)
  const [date, time] = str.split(" ");
  const [y,m,d] = date.split("-");
  const [hh,mm] = time.split(":");

  const utc = new Date(Date.UTC(
    Number(y),
    Number(m)-1,
    Number(d),
    Number(hh)-10, // AEST offset
    Number(mm)
  ));

  return utc;
}

// Convert UTC → local display
function toLocalTime(utc) {
  return new Date(utc).toLocaleString();
}

/* ---------------- LOCK LOGIC ---------------- */

async function isLocked(match) {
  const now = new Date();
  const kickoff = new Date(match.kickoffUTC);

  const diff = (kickoff - now) / 60000; // minutes

  return diff <= 30; // auto lock 30 min before
}

/* ---------------- RENDER MATCHES ---------------- */

async function loadMatches() {
  const snap = await getDocs(collection(db,"matches"));

  const list = [];
  snap.forEach(d => list.push({id:d.id,...d.data()}));

  const box = document.getElementById("matches");
  const resultsBox = document.getElementById("resultsList");

  box.innerHTML = "";
  resultsBox.innerHTML = "";

  for (const m of list) {

    const locked = await isLocked(m);

    /* ---------- PREDICTION CARD ---------- */

    box.innerHTML += `
      <div class="glass p-3 mb-3">
        <div class="text-sm text-gray-300">${m.stage}</div>

        <div class="font-bold text-lg">
          ${m.home} vs ${m.away}
        </div>

        <div class="text-yellow-300 text-sm">
          Kickoff (Local): ${toLocalTime(m.kickoffUTC)}
        </div>

        <input id="h-${m.id}" ${locked?"disabled":""} placeholder="H" class="text-black w-12"/>
        :
        <input id="a-${m.id}" ${locked?"disabled":""} placeholder="A" class="text-black w-12"/>
      </div>
    `;

    /* ---------- RESULTS TAB (ONLY COMPLETED) ---------- */

    if (m.result) {
      resultsBox.innerHTML += `
        <div class="glass p-3 mb-2">
          <b>${m.home} ${m.result.home} - ${m.result.away} ${m.away}</b>
          <div class="text-sm text-gray-300">
            Completed
          </div>
        </div>
      `;
    }

    /* ---------- ADMIN ---------- */

    document.getElementById("adminList").innerHTML += `
      <div class="glass p-3 mb-2">
        ${m.home} vs ${m.away}

        <input id="rh-${m.id}" class="text-black w-12"/>
        :
        <input id="ra-${m.id}" class="text-black w-12"/>

        <button onclick="saveResult('${m.id}')"
          class="bg-yellow-400 text-black px-2 py-1">
          Save
        </button>
      </div>
    `;
  }
}

/* ---------------- ADD MATCH ---------------- */

document.getElementById("addMatch").onclick = async () => {

  const home = document.getElementById("home").value;
  const away = document.getElementById("away").value;
  const kickoff = document.getElementById("kickoff").value;

  const utc = parseAESTtoUTC(kickoff);

  await addDoc(collection(db,"matches"), {
    home,
    away,
    kickoffUTC: utc.toISOString(),
    stage: "Group"
  });

};

/* ---------------- SAVE RESULT ---------------- */

window.saveResult = async (id) => {

  const h = document.getElementById("rh-"+id).value;
  const a = document.getElementById("ra-"+id).value;

  await setDoc(doc(db,"results",id),{
    home:Number(h),
    away:Number(a)
  });

};

/* ---------------- INIT ---------------- */

loadMatches();

</script>

</body>
</html>
